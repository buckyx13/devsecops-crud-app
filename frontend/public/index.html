<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Basic CSP as defense-in-depth; nginx also sets security headers -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self';" />
  <title>CRUD DevSecOps Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Inventory CRUD — 3-Tier DevSecOps Demo</h1>
  </header>

  <main>
    <section class="form-section">
      <h2 id="form-title">Add Item</h2>
      <form id="item-form">
        <input type="hidden" id="item-id" />
        <label for="name">Name</label>
        <input type="text" id="name" maxlength="100" required />

        <label for="description">Description</label>
        <textarea id="description" maxlength="500"></textarea>

        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" min="0" required />

        <div class="form-actions">
          <button type="submit" id="submit-btn">Add Item</button>
          <button type="button" id="cancel-btn" hidden>Cancel</button>
        </div>
      </form>
      <p id="status-msg" role="status"></p>
    </section>

    <section class="list-section">
      <h2>Items</h2>
      <table id="items-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Quantity</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="items-body"></tbody>
      </table>
    </section>
  </main>

  <footer>
    <p>Frontend (Nginx) &rarr; Load Balancer &rarr; Backend API (Node/Express) &rarr; PostgreSQL</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
