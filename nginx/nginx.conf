# This is the EDGE LOAD BALANCER for docker-compose mode.
# It load-balances across multiple backend and frontend replicas
# (scale them with: docker compose up --scale backend=3 --scale frontend=2).
# In Kubernetes, this role is taken over by the K8s Service + Ingress
# (see k8s/base/ingress.yaml) — this file is for local/docker-compose study only.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Hide nginx version (reduces info disclosure)
    server_tokens off;

    # Round-robin load balancing across replicas (Docker's embedded DNS
    # resolves "backend"/"frontend" to all replica IPs).
    upstream backend_upstream {
        server backend:5000;
    }

    upstream frontend_upstream {
        server frontend:8080;
    }

    limit_req_zone $binary_remote_addr zone=lb_limit:10m rate=20r/s;

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        location /api/ {
            limit_req zone=lb_limit burst=40 nodelay;
            proxy_pass http://backend_upstream/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://frontend_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
