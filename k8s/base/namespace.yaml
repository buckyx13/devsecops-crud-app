apiVersion: v1
kind: Namespace
metadata:
  name: crud-app
  labels:
    name: crud-app
    # Pod Security Admission (built into K8s 1.25+): enforces the
    # "restricted" profile cluster-natively, on top of Kyverno's custom rules.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
