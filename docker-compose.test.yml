# Throwaway Postgres for running backend Jest tests locally.
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   cd backend && npm test
#   docker compose -f docker-compose.test.yml down -v
version: "3.9"
services:
  postgres-test:
    image: postgres:16-alpine
    container_name: crud-postgres-test
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: cruddb_test
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data # ephemeral storage, fast + auto-cleaned
